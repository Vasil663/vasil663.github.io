<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Cold Ultimate</title>

<style>
:root{
--bg:#050816;
--card:#0f172a;
--neon:#7c3aed;
--cyber:#00f7ff;
--orange:#ff7b00;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family:Arial, sans-serif;
background:var(--bg);
color:white;
overflow-x:hidden;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:1s;
}

#intro h1{
font-size:70px;
text-shadow:0 0 40px var(--neon),0 0 80px var(--cyber);
animation:zoom 2s ease forwards;
}

@keyframes zoom{
from{opacity:0;transform:scale(.5);}
to{opacity:1;transform:scale(1);}
}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(5,8,22,.9);
backdrop-filter:blur(15px);
padding:20px;
text-align:center;
border-bottom:1px solid var(--neon);
box-shadow:0 0 20px var(--neon);
z-index:10;
}

nav a{
color:#cbd5f5;
margin:0 10px;
text-decoration:none;
border:1px solid var(--neon);
padding:6px 12px;
border-radius:8px;
transition:.3s;
}

nav a:hover{
color:white;
box-shadow:0 0 15px var(--neon),0 0 25px var(--cyber);
}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(.4);
}

.hero h2{
font-size:65px;
text-shadow:0 0 30px var(--neon),0 0 60px var(--cyber);
}

.hero p{
margin:20px 0;
font-size:20px;
}

.hero-btn{
padding:16px 40px;
background:linear-gradient(45deg,var(--neon),var(--cyber));
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
transition:.3s;
}

.hero-btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px var(--neon),0 0 60px var(--cyber);
}

/* SECTIONS */
section{
max-width:1100px;
margin:80px auto;
padding:40px;
background:var(--card);
border-radius:20px;
box-shadow:0 0 40px rgba(124,58,237,.5);
text-align:center;
}

h2{
margin-bottom:25px;
text-shadow:0 0 15px var(--neon);
}

/* STATS */
.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.stat-card{
background:#0b1120;
padding:30px;
border-radius:15px;
transition:.3s;
box-shadow:0 0 20px rgba(0,247,255,.3);
}

.stat-card:hover{
transform:translateY(-10px);
box-shadow:0 0 40px var(--cyber);
}

.stat-card h3{
font-size:40px;
color:var(--cyber);
}

/* VIDEO GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:15px;
transition:.3s;
}

iframe:hover{
transform:scale(1.05);
box-shadow:0 0 25px var(--neon);
}

/* BUTTON */
.join-btn{
margin-top:20px;
padding:16px 40px;
background:linear-gradient(45deg,var(--orange),#ff3c00);
color:black;
font-weight:bold;
border-radius:12px;
border:none;
cursor:pointer;
transition:.3s;
}

.join-btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px var(--orange);
}

footer{
text-align:center;
padding:40px;
color:#94a3b8;
}
</style>
</head>

<body>

<div id="intro">
<h1>DARK COLD</h1>
</div>

<header>
<h1>Dark Cold Ultimate</h1>
<nav>
<a href="#server">Server</a>
<a href="#stats">Stats</a>
<a href="#videos">Videos</a>
<a href="https://discord.gg/JP2vAUmE" target="_blank">Discord</a>
</nav>
</header>

<section class="hero">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-gaming-setup-1585/1080p.mp4" type="video/mp4">
</video>
<div>
<h2>Summer City RP</h2>
<p>Hardcore RP • eSports • Cyberpunk</p>
<a href="#server" class="hero-btn">ENTER</a>
</div>
</section>

<section id="server">
<h2>🔥 Join FiveM</h2>
<button class="join-btn" onclick="connectServer()">JOIN SERVER</button>
<div style="margin-top:20px;">
<div id="status">Checking...</div>
👥 Players: <span id="players">0</span>
</div>
</section>

<section id="stats">
<h2>📊 Server Statistics</h2>
<div class="stats-grid">
<div class="stat-card"><h3 id="c1">0</h3><p>Registered Players</p></div>
<div class="stat-card"><h3 id="c2">0</h3><p>Total Vehicles</p></div>
<div class="stat-card"><h3 id="c3">0</h3><p>Active Jobs</p></div>
</div>
</section>

<section id="videos">
<h2>🎮 Fortnite & CS</h2>
<div class="grid">
<iframe src="https://www.youtube.com/embed/pV3Wa5qkJ8w" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/5dAdSchbwko" allowfullscreen></iframe>
</div>
</section>

<footer>
© 2026 Dark Cold Ultimate
</footer>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("intro").style.opacity="0";
setTimeout(()=>{document.getElementById("intro").style.display="none";},1000);
},2500);
});

/* CONNECT */
function connectServer(){
window.location.href="fivem://connect/93.123.16.175:30120";
}

/* STATUS */
async function checkServer(){
try{
const r=await fetch("https://api.allorigins.win/raw?url=http://93.123.16.175:30120/players.json");
const d=await r.json();
document.getElementById("status").innerHTML="🟢 ONLINE";
document.getElementById("players").innerHTML=d.length;
}catch{
document.getElementById("status").innerHTML="🔴 OFFLINE";
}
}
checkServer();
setInterval(checkServer,30000);

/* COUNTERS */
function animate(id,target){
let c=0;
let inc=target/100;
let i=setInterval(()=>{
c+=inc;
if(c>=target){c=target;clearInterval(i);}
document.getElementById(id).innerText=Math.floor(c);
},20);
}
window.onload=()=>{
animate("c1",542);
animate("c2",128);
animate("c3",12);
};
</script>

<div id="tsparticles"></div>

<script>
tsParticles.load("tsparticles",{
fullScreen:{enable:true,zIndex:-1},
particles:{
number:{value:70},
color:{value:"#00f7ff"},
size:{value:2},
move:{enable:true,speed:1},
links:{enable:true,color:"#7c3aed"}
}
});
</script>

</body>
</html>
