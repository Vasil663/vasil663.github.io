<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Gaming Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg1:#020617; --bg2:#020a2a; --card:#020b1f;
  --glow:#7c3aed; --fortnite:#22d3ee; --cs:#22c55e; --music:#e879f9;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top, var(--bg2), var(--bg1) 70%);
  color:#e5e7eb; min-height:100vh; overflow-x:hidden;
}

header{
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(10px);
  background:rgba(2,6,23,.75);
  border-bottom:1px solid rgba(124,58,237,.3);
}

.nav{
  max-width:1200px;margin:auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
}

.logo{font-weight:900;font-size:22px;color:#c4b5fd;text-shadow:0 0 12px #7c3aed}

.menu a{
  margin-left:12px;text-decoration:none;color:#cbd5f5;
  padding:8px 12px;border-radius:10px;font-weight:700;
  transition:.2s;
}
.menu a:hover{background:rgba(124,58,237,.2);box-shadow:0 0 16px #7c3aed;color:#fff}

.music-toggle{
  margin-left:10px;padding:8px 12px;border-radius:10px;
  background:rgba(124,58,237,.2);
  border:1px solid rgba(124,58,237,.6);
  color:#fff;cursor:pointer;font-weight:700;
  box-shadow:0 0 12px #7c3aed;
}

main{
  max-width:1200px;margin:40px auto 100px;padding:0 20px;
  display:flex;flex-direction:column;gap:40px;
}

section{
  background:linear-gradient(180deg,#020b1f,#020617);
  border-radius:18px;padding:24px;
  border:1px solid rgba(124,58,237,.25);
  box-shadow:0 0 40px rgba(124,58,237,.2);
}

h2{margin-bottom:6px;font-size:28px;text-shadow:0 0 12px #7c3aed}
.tags{color:#94a3b8;margin-bottom:16px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}

.card{
  background:#020617;border-radius:16px;padding:10px;
  border:1px solid rgba(124,58,237,.3);
  box-shadow:0 0 24px rgba(124,58,237,.35);
  transition:.25s;
}
.card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 0 40px #7c3aed}

iframe{width:100%;aspect-ratio:16/9;border-radius:12px;border:none}

.fortnite h2{color:var(--fortnite)}
.cs h2{color:var(--cs)}
.music h2{color:var(--music)}

footer{text-align:center;padding:40px;color:#94a3b8}

.snowflake{
  position:fixed;top:-10px;color:#7dd3fc;
  animation:fall linear infinite;pointer-events:none;
  text-shadow:0 0 8px #7dd3fc;z-index:999;
}
@keyframes fall{to{transform:translateY(110vh)}}
</style>
</head>
<body>

<audio id="bgMusic" src="https://cdn.pixabay.com/audio/2022/10/03/audio_7f3a4b7b65.mp3" loop></audio>

<header>
  <div class="nav">
    <div class="logo">🎮 Gaming Hub</div>
    <nav class="menu">
      <a href="#fortnite">Fortnite</a>
      <a href="#cs">CS</a>
      <a href="#music">Music</a>
      <a href="#rules">Правила</a>
      <a href="https://discord.gg/TVOQ-LINK" target="_blank">Discord</a>
      <button class="music-toggle" onclick="toggleMusic()">🎵 Music</button>
    </nav>
  </div>
</header>

<main>
  <section id="fortnite" class="fortnite">
    <h2>Fortnite</h2>
    <div class="tags">#highlights #tips</div>
    <div class="grid">
      <div class="card"><iframe src="https://www.youtube.com/embed/pV3Wa5qkJ8w" allowfullscreen></iframe></div>
      <div class="card"><iframe src="https://www.youtube.com/embed/GOz0pPX9tvA" allowfullscreen></iframe></div>
    </div>
  </section>

  <section id="cs" class="cs">
    <h2>CS</h2>
    <div class="tags">#smokes #tactics</div>
    <div class="grid">
      <div class="card"><iframe src="https://www.youtube.com/embed/5dAdSchbwko" allowfullscreen></iframe></div>
      <div class="card"><iframe src="https://www.youtube.com/embed/pV3Wa5qkJ8w" allowfullscreen></iframe></div>
    </div>
  </section>

  <section id="music" class="music">
    <h2>Music</h2>
    <div class="grid">
      <div class="card"><iframe src="https://www.youtube.com/embed/zoa8xnzKC_U" allowfullscreen></iframe></div>
    </div>
  </section>

  <section id="rules">
    <h2>Правила</h2>
    <ul>
      <li>❌ Без спам</li>
      <li>❌ Без обиди</li>
      <li>✅ Уважение</li>
      <li>✅ Само gaming съдържание</li>
    </ul>
  </section>
</main>

<footer>© 2026 Gaming Hub</footer>

<script>
const music=document.getElementById("bgMusic");
music.volume=0.15;

window.addEventListener("click",()=>{if(music.paused)music.play()},{once:true});
function toggleMusic(){music.paused?music.play():music.pause();}

function snow(){
  const s=document.createElement("div");
  s.className="snowflake"; s.innerHTML="❄";
  s.style.left=Math.random()*window.innerWidth+"px";
  s.style.animationDuration=5+Math.random()*6+"s";
  s.style.fontSize=10+Math.random()*16+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),11000);
}
setInterval(snow,200);
</script>

</body>
</html>
