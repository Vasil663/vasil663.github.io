 <!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <title>Gaming Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    :root {
      --bg1: #020617;
      --bg2: #020a2a;
      --card: #020b1f;
      --glow: #7c3aed;
      --fortnite: #22d3ee;
      --cs: #22c55e;
      --music: #e879f9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, Arial, sans-serif;
      background: radial-gradient(circle at top, #020a2a, #020617 70%);
      color: #e5e7eb;
      overflow-x: hidden;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(2, 6, 23, 0.75);
      border-bottom: 1px solid rgba(124,58,237,0.3);
    }

    .nav {
      max-width: 1200px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 22px;
      color: #c4b5fd;
      text-shadow: 0 0 12px rgba(124,58,237,0.9);
    }

    .menu a {
      margin-left: 14px;
      text-decoration: none;
      color: #cbd5f5;
      padding: 8px 12px;
      border-radius: 10px;
      transition: 0.2s;
      font-weight: 700;
    }

    .menu a:hover {
      background: rgba(124,58,237,0.18);
      box-shadow: 0 0 14px rgba(124,58,237,0.7);
      color: white;
    }

    main {
      max-width: 1200px;
      margin: 40px auto 100px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    section {
      background: linear-gradient(180deg, rgba(2,11,31,0.95), rgba(2,6,23,0.95));
      border-radius: 18px;
      padding: 24px;
      border: 1px solid rgba(124,58,237,0.25);
      box-shadow: 0 0 40px rgba(124,58,237,0.2);
      position: relative;
      overflow: hidden;
    }

    section::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(124,58,237,0.2), transparent 60%);
      pointer-events: none;
    }

    h2 {
      margin-bottom: 6px;
      font-size: 28px;
      text-shadow: 0 0 14px rgba(124,58,237,0.7);
    }

    .tags {
      color: #94a3b8;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: linear-gradient(180deg, #020b1f, #020617);
      border-radius: 16px;
      padding: 10px;
      border: 1px solid rgba(124,58,237,0.3);
      box-shadow: 0 0 24px rgba(124,58,237,0.35);
      transition: 0.25s;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 0 40px rgba(124,58,237,0.8);
    }

    iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      border: none;
    }

    .fortnite h2 { color: var(--fortnite); }
    .cs h2 { color: var(--cs); }
    .music h2 { color: var(--music); }

    footer {
      text-align: center;
      padding: 40px 10px;
      color: #94a3b8;
    }

    /* Snow */
    .snowflake {
      position: fixed;
      top: -10px;
      color: #7dd3fc;
      font-size: 14px;
      user-select: none;
      pointer-events: none;
      animation: fall linear infinite;
      text-shadow: 0 0 8px rgba(125,211,252,0.9);
      z-index: 999;
    }

    @keyframes fall {
      to { transform: translateY(110vh); }
    }
  </style>
</head>
<body>

<header>
  <div class="nav">
    <div class="logo">🎮 Gaming Hub</div>
    <nav class="menu">
      <a href="#fortnite">Fortnite</a>
      <a href="#cs">CS</a>
      <a href="#music">Music</a>
      <a href="#rules">Правила</a>
      <a href="https://discord.gg/TVOQ-LINK" target="_blank">Discord</a>
    </nav>
  </div>
</header>

<main>
  <section id="fortnite" class="fortnite">
    <h2>Fortnite</h2>
    <div class="tags">#highlights #tips #pro</div>
    <div class="grid">
      <div class="card">
        <iframe src="https://www.youtube.com/embed/pV3Wa5qkJ8w" allowfullscreen></iframe>
      </div>
      <div class="card">
        <iframe src="https://www.youtube.com/embed/GOz0pPX9tvA" allowfullscreen></iframe>
      </div>
    </div>
  </section>

  <section id="cs" class="cs">
    <h2>CS</h2>
    <div class="tags">#smokes #tactics #highlights</div>
    <div class="grid">
      <div class="card">
        <iframe src="https://www.youtube.com/embed/5dAdSchbwko" allowfullscreen></iframe>
      </div>
      <div class="card">
        <iframe src="https://www.youtube.com/embed/pV3Wa5qkJ8w" allowfullscreen></iframe>
      </div>
    </div>
  </section>

  <section id="music" class="music">
    <h2>Music</h2>
    <div class="tags">#playlist #vibes</div>
    <div class="grid">
      <div class="card">
        <iframe src="https://www.youtube.com/embed/zoa8xnzKC_U" allowfullscreen></iframe>
      </div>
    </div>
  </section>

  <section id="rules">
    <h2>Правила</h2>
    <ul style="line-height:1.8; color:#cbd5f5;">
      <li>❌ Без спам</li>
      <li>❌ Без обиди</li>
      <li>✅ Уважение към всички</li>
      <li>✅ Само gaming съдържание</li>
    </ul>
  </section>
</main>

<footer>
  © 2026 Gaming Hub • Made with 🔥
</footer>

<script>
  function createSnow() {
    const snow = document.createElement("div");
    snow.className = "snowflake";
    snow.innerHTML = "❄";
    snow.style.left = Math.random() * window.innerWidth + "px";
    snow.style.animationDuration = 5 + Math.random() * 6 + "s";
    snow.style.opacity = Math.random();
    snow.style.fontSize = 10 + Math.random() * 16 + "px";
    document.body.appendChild(snow);
    setTimeout(() => snow.remove(), 11000);
  }
  setInterval(createSnow, 200);
</script>

</body>
</html>
