<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Cold Hub</title>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --glow:#7c3aed;
  --orange:#ff9900;
}

html{scroll-behavior:smooth;}
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617 70%);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  backdrop-filter:blur(15px);
  background:rgba(2,6,23,0.85);
  padding:20px;
  text-align:center;
  border-bottom:1px solid rgba(124,58,237,.5);
  box-shadow:0 0 25px rgba(124,58,237,.4);
  z-index:10;
}

header h1{
  font-size:28px;
  letter-spacing:2px;
  text-shadow:0 0 20px var(--glow);
}

nav a{
  color:#cbd5f5;
  margin:0 8px;
  text-decoration:none;
  font-weight:bold;
  border:1px solid var(--glow);
  padding:6px 12px;
  border-radius:8px;
  transition:.3s;
}

nav a:hover{
  box-shadow:0 0 15px var(--glow);
  color:white;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
  url("https://images.unsplash.com/photo-1542751371-adc38448a05e") center/cover;
}

.hero h2{
  font-size:60px;
  text-shadow:0 0 30px var(--glow);
}

.hero p{
  margin:15px 0;
  font-size:20px;
  color:#cbd5f5;
}

.hero-btn{
  padding:15px 40px;
  background:linear-gradient(45deg,#7c3aed,#9333ea);
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  transition:.3s;
}

.hero-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px var(--glow);
}

/* SECTIONS */
section{
  max-width:1100px;
  margin:60px auto;
  padding:30px;
  background:var(--card);
  border-radius:20px;
  box-shadow:0 0 40px rgba(124,58,237,.5),
              inset 0 0 25px rgba(124,58,237,.15);
  transition:.4s;
}

section:hover{
  transform:translateY(-5px);
  box-shadow:0 0 60px rgba(124,58,237,.7);
}

h2{
  margin-bottom:20px;
  text-align:center;
  text-shadow:0 0 15px var(--glow);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

iframe{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:15px;
  transition:.3s;
}

iframe:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px var(--glow);
}

.join-btn{
  display:inline-block;
  margin-top:20px;
  padding:16px 40px;
  background:linear-gradient(45deg,#ff9900,#ff5e00);
  color:black;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
  transition:.3s;
}

.join-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px #ff9900;
}

footer{
  text-align:center;
  padding:40px;
  color:#94a3b8;
}
</style>
</head>

<body>

<header>
  <h1>❄ DARK COLD HUB ❄</h1>
  <nav>
    <a href="#server">Server</a>
    <a href="#fortnite">Fortnite</a>
    <a href="#cs">CS</a>
    <a href="#music">Music</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Ultimate Gaming Experience</h2>
    <p>FiveM • Fortnite • CS • Music</p>
    <a href="#server" class="hero-btn">ENTER HUB</a>
  </div>
</section>

<section id="server">
  <h2>🔥 Summer City RP</h2>
  <p style="text-align:center;">ESX • Без whitelist • Средна икономика</p>
  <div style="text-align:center;">
    <button class="join-btn" onclick="connectServer()">🔥 JOIN SERVER</button>
  </div>
</section>

<section id="fortnite">
  <h2>Fortnite</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/pV3Wa5qkJ8w" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/GOz0pPX9tvA" allowfullscreen></iframe>
  </div>
</section>

<section id="cs">
  <h2>CS</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/5dAdSchbwko" allowfullscreen></iframe>
  </div>
</section>

<section id="music">
  <h2>Music</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/zoa8xnzKC_U" allowfullscreen></iframe>
  </div>
</section>

<footer>
© 2026 Dark Cold Hub
</footer>

<script>
function connectServer(){
  window.location.href="fivem://connect/93.123.16.175:30120";
}
</script>

</body>
</html>
