<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <title>Gaming Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: #e5e7eb;
    }

    header {
      background: #020617;
      padding: 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    nav a {
      color: #38bdf8;
      margin: 0 12px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    section {
      padding: 40px 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #020617;
      padding: 24px;
      border-radius: 14px;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1, h2 {
      margin-top: 0;
    }

    iframe {
      width: 100%;
      max-width: 720px;
      height: 405px;
      border-radius: 12px;
      display: block;
      margin: 20px auto 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>🎮 Gaming Hub</h1>
  <nav>
    <a href="#fortnite">Fortnite</a>
    <a href="#cs">CS</a>
    <a href="#news">Новини</a>
  </nav>
</header>

<section id="fortnite">
  <div class="card">
    <h2>Fortnite</h2>
    <p>Тук ще качвам гайдове, сетъпи и клипове за Fortnite.</p>
    <iframe 
      src="https://www.youtube.com/embed/pV3Wa5qkJ8w" 
      title="Fortnite видео"
      allowfullscreen>
    </iframe>
  </div>
</section>

<section id="cs">
  <div class="card">
    <h2>CS</h2>
    <p>Тук ще качвам тактики, смокове и хайлайтове за CS.</p>
    <iframe 
      src="https://www.youtube.com/embed/5dAdSchbwko" 
      title="CS видео"
      allowfullscreen>
    </iframe>
  </div>
</section>

<section id="news">
  <div class="card">
    <h2>Новини</h2>
    <p>Последни ъпдейти и пачове за любимите игри.</p>
  </div>
</section>

<footer>
  © 2026 Gaming Hub
</footer>

</body>
</html>
