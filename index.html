<!DOCTYPE html>
<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <title>Gaming Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    header {
      background: #020617;
      padding: 20px;
      text-align: center;
    }
    nav a {
      color: #38bdf8;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }
    section {
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }
    .card {
      background: #020617;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 40px;
      text-align: center;
    }
    iframe {
      max-width: 100%;
      border-radius: 12px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎮 Gaming Hub</h1>
    <nav>
      <a href="#fortnite">Fortnite</a>
      <a href="#cs">CS</a>
      <a href="#news">Новини</a>
    </nav>
  </header>

  <section id="fortnite">
    <div class="card">
      <h2>Fortnite</h2>
      <p>Тук ще качвам гайдове, сетъпи и клипове за Fortnite.</p>

      <!-- Fortnite video -->
      <iframe width="560" height="315"
        src="https://www.youtube.com/embed/pV3Wa5qkJ8w"
        title="Fortnite video"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </section>

  <section id="cs">
    <div class="card">
      <h2>CS</h2>
      <p>Тук ще качвам тактики, смокове и хайлайтове от CS.</p>

      <!-- CS video -->
      <iframe width="560" height="315"
        src="https://www.youtube.com/embed/5dAdSchbwko"
        title="CS video"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </section>

  <section id="news">
    <div class="card">
      <h2>Новини</h2>
      <p>Последни ъпдейти и пачове за любимите игри.</p>
    </div>
  </section>

  <footer>
    © 2026 Gaming Hub
  </footer>

</body>
</html>
