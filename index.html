<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Hub</title>

<style>
html { scroll-behavior: smooth; }

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617 70%);
  color:white;
  min-height:100vh;
}

header{
  background:rgba(0,0,0,0.6);
  padding:20px;
  text-align:center;
  border-bottom:2px solid #ff9900;
}

h1{margin-bottom:10px;}

nav a{
  color:#ff9900;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

section{
  max-width:1100px;
  margin:50px auto;
  padding:20px;
  background:#0f172a;
  border-radius:15px;
  box-shadow:0 0 25px rgba(255,153,0,0.3);
}

h2{margin-bottom:20px;text-align:center;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

iframe{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:12px;
}

.join-btn{
  display:inline-block;
  margin-top:20px;
  padding:15px 30px;
  background:#ff9900;
  color:black;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
  transition:.3s;
}

.join-btn:hover{
  background:#ffb84d;
  transform:scale(1.05);
}

ul{list-style:none;text-align:center;}
ul li{margin:8px 0;}

footer{
  text-align:center;
  padding:30px;
  color:#94a3b8;
}
</style>
</head>

<body>

<header>
  <h1>🎮 Gaming Hub</h1>
  <nav>
    <a href="#server">Server</a>
    <a href="#fortnite">Fortnite</a>
    <a href="#cs">CS</a>
    <a href="#music">Music</a>
  </nav>
</header>

<!-- SERVER SECTION -->
<section id="server">
  <h2>🔥 Summer City RP</h2>
  <p style="text-align:center;">ESX • Без whitelist • Средна икономика</p>
  <div style="text-align:center;">
    <a href="fivem://connect/93.123.16.175:30120" class="join-btn">
      🔥 JOIN SERVER
    </a>
  </div>
</section>

<!-- FORTNITE -->
<section id="fortnite">
  <h2>Fortnite</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/pV3Wa5qkJ8w" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/GOz0pPX9tvA" allowfullscreen></iframe>
  </div>
</section>

<!-- CS -->
<section id="cs">
  <h2>CS</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/5dAdSchbwko" allowfullscreen></iframe>
  </div>
</section>

<!-- MUSIC -->
<section id="music">
  <h2>Music</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/zoa8xnzKC_U" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/gwsQg27p_H0" allowfullscreen></iframe>
  </div>
</section>

<section>
  <h2>📜 Правила</h2>
  <ul>
    <li>❌ Без обиди</li>
    <li>❌ Без спам</li>
    <li>✅ Уважение</li>
    <li>✅ Само gaming съдържание</li>
  </ul>
</section>

<footer>
© 2026 Gaming Hub
</footer>

</body>
</html>
