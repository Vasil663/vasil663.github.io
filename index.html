<!DOCTYPE html>
<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <title>Gaming Hub</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #e5e7eb;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    header h1 {
      margin-bottom: 10px;
    }

    nav a {
      color: #38bdf8;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }

    .card {
      background: #020617;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .card p {
      margin-bottom: 20px;
      color: #cbd5f5;
    }

    iframe {
      width: 100%;
      height: 315px;
      border-radius: 12px;
      border: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎮 Gaming Hub</h1>
    <nav>
      <a href="#fortnite">Fortnite</a>
      <a href="#cs">CS</a>
      <a href="#news">Новини</a>
    </nav>
  </header>

  <main>

    <!-- Fortnite секция -->
    <section id="fortnite">
      <div class="card">
        <h2>Fortnite</h2>
        <p>Тук ще качвам гайдове, сетъпи и клипове за Fortnite.</p>

        <!-- Fortnite видео -->
        <iframe 
          src="https://www.youtube.com/embed/pV3Wa5qkJ8w"
          title="Fortnite video"
          allowfullscreen>
        </iframe>

      </div>
    </section>

    <!-- CS секция -->
    <section id="cs">
      <div class="card">
        <h2>CS</h2>
        <p>Тук ще качвам тактики, смокове и хайлайтове от CS.</p>

        <!-- CS видео -->
        <iframe 
          src="https://www.youtube.com/embed/5dAdSchbwko"
          title="CS video"
          allowfullscreen>
        </iframe>

      </div>
    </section>

    <!-- Новини -->
    <section id="news">
      <div class="card">
        <h2>Новини</h2>
        <p>Последни ъпдейти и пачове за любимите игри.</p>
      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 Gaming Hub</p>
  </footer>

</body>
</html>
