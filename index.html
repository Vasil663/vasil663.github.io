<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Cold RP</title>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --glow:#7c3aed;
  --orange:#ff9900;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  font-family:Arial, sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:1s;
}

#intro h1{
  font-size:70px;
  text-shadow:0 0 40px var(--glow);
  animation:zoom 2s ease forwards;
}

@keyframes zoom{
  from{opacity:0;transform:scale(.6);}
  to{opacity:1;transform:scale(1);}
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:rgba(2,6,23,.9);
  backdrop-filter:blur(15px);
  padding:20px;
  text-align:center;
  border-bottom:1px solid var(--glow);
  box-shadow:0 0 20px var(--glow);
}

nav a{
  color:#cbd5f5;
  margin:0 10px;
  text-decoration:none;
  border:1px solid var(--glow);
  padding:6px 12px;
  border-radius:8px;
  transition:.3s;
}

nav a:hover{
  box-shadow:0 0 15px var(--glow);
  color:white;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
  url("https://images.unsplash.com/photo-1542751371-adc38448a05e") center/cover;
}

.hero h2{
  font-size:60px;
  text-shadow:0 0 30px var(--glow);
}

.hero p{
  margin:15px 0;
  font-size:20px;
  color:#cbd5f5;
}

.hero-btn{
  padding:16px 40px;
  background:linear-gradient(45deg,#7c3aed,#9333ea);
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  transition:.3s;
}

.hero-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px var(--glow);
}

/* SECTIONS */
section{
  max-width:1000px;
  margin:60px auto;
  padding:30px;
  background:var(--card);
  border-radius:20px;
  box-shadow:0 0 40px rgba(124,58,237,.5),
              inset 0 0 25px rgba(124,58,237,.15);
  text-align:center;
}

h2{
  margin-bottom:20px;
  text-shadow:0 0 15px var(--glow);
}

.join-btn{
  margin-top:20px;
  padding:16px 40px;
  background:linear-gradient(45deg,#ff9900,#ff5e00);
  color:black;
  font-weight:bold;
  border-radius:12px;
  border:none;
  cursor:pointer;
  transition:.3s;
}

.join-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px #ff9900;
}

.status{
  margin-top:20px;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

iframe{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:15px;
  transition:.3s;
}

iframe:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px var(--glow);
}

footer{
  text-align:center;
  padding:40px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div id="intro">
  <h1>❄ DARK COLD RP ❄</h1>
</div>

<header>
  <h1>Dark Cold Hub</h1>
  <nav>
    <a href="#server">Server</a>
    <a href="#fortnite">Fortnite</a>
    <a href="#cs">CS</a>
    <a href="https://discord.gg/JP2vAUmE" target="_blank">Discord</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Summer City RP</h2>
    <p>FiveM • Fortnite • CS</p>
    <a href="#server" class="hero-btn">ENTER SERVER</a>
  </div>
</section>

<section id="server">
  <h2>🔥 Join FiveM Server</h2>
  <button class="join-btn" onclick="connectServer()">JOIN SERVER</button>

  <div class="status">
    <div id="status">Проверка...</div>
    👥 Players: <span id="players">0</span>
  </div>
</section>

<section id="fortnite">
  <h2>🎮 Fortnite Videos</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/pV3Wa5qkJ8w" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/GOz0pPX9tvA" allowfullscreen></iframe>
  </div>
</section>

<section id="cs">
  <h2>🔫 CS Videos</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/5dAdSchbwko" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
  </div>
</section>

<footer>
© 2026 Dark Cold RP
</footer>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.opacity="0";
    setTimeout(()=>{
      document.getElementById("intro").style.display="none";
    },1000);
  },2500);
});

function connectServer(){
  window.location.href="fivem://connect/93.123.16.175:30120";
}

async function checkServer(){
  try{
    const response = await fetch("https://api.allorigins.win/raw?url=http://93.123.16.175:30120/players.json");
    const data = await response.json();
    document.getElementById("status").innerHTML="🟢 ONLINE";
    document.getElementById("players").innerHTML=data.length;
  }catch{
    document.getElementById("status").innerHTML="🔴 OFFLINE";
    document.getElementById("players").innerHTML="0";
  }
}

checkServer();
setInterval(checkServer,30000);

tsParticles.load("tsparticles",{
  fullScreen:{enable:true,zIndex:-1},
  particles:{
    number:{value:60},
    color:{value:"#7c3aed"},
    size:{value:2},
    move:{enable:true,speed:1},
    links:{
      enable:true,
      distance:150,
      color:"#7c3aed",
      opacity:0.4
    }
  }
});
</script>

<div id="tsparticles"></div>

</body>
</html>
