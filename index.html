<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GameZone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,Arial,sans-serif;color:#e5e7eb;overflow-x:hidden;background:radial-gradient(circle at top,#0b1025,#020617 60%)}
header{position:sticky;top:0;z-index:10;background:rgba(2,6,23,.75);backdrop-filter:blur(10px);padding:12px 18px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#e5e7eb;margin-left:14px;text-decoration:none;font-weight:800}

.parallax{position:fixed;inset:0;z-index:-1;background:
radial-gradient(600px 300px at 20% 10%, rgba(56,189,248,.15), transparent 60%),
radial-gradient(500px 300px at 80% 20%, rgba(167,139,250,.12), transparent 60%),
linear-gradient(#020617,#020617)}

.hero{min-height:90vh;display:grid;place-items:center;text-align:center;padding:90px 16px}
.welcome{font-size:46px;margin-bottom:10px;animation:glow 2s ease-in-out infinite alternate,float 3s ease-in-out infinite}
@keyframes glow{from{text-shadow:0 0 10px rgba(56,189,248,.3)}to{text-shadow:0 0 35px rgba(56,189,248,.95)}}
@keyframes float{50%{transform:translateY(-6px)}}
.subtitle{opacity:.9;margin-bottom:22px}

.btn{--c1:#ff00ff;--c2:#00ffff;--c3:#00ff00;border:0;cursor:pointer;font-weight:900;padding:14px 26px;border-radius:999px;background:#0b1025;color:#e5e7eb;position:relative;overflow:hidden}
.btn::before{content:"";position:absolute;inset:-2px;border-radius:inherit;background:linear-gradient(120deg,var(--c1),var(--c2),var(--c3),var(--c1));filter:blur(10px);animation:rgb 3s linear infinite}
.btn::after{content:"";position:absolute;inset:2px;border-radius:inherit;background:#0b1025}
.btn span{position:relative;z-index:1}
@keyframes rgb{to{filter:hue-rotate(360deg)}}

.wrap{max-width:1100px;margin:0 auto;padding:24px}
.card{background:rgba(15,23,42,.55);backdrop-filter:blur(12px);border-radius:18px;padding:22px;margin:18px 0;box-shadow:0 10px 25px rgba(0,0,0,.45);opacity:0;transform:translateY(20px) scale(.98);transition:.6s}
.card.show{opacity:1;transform:none}

.video{width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.6)}

.particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.particle{position:absolute;width:2px;height:2px;background:rgba(56,189,248,.7);border-radius:50%;animation:drift linear infinite}
@keyframes drift{from{transform:translateY(100vh)}to{transform:translateY(-10vh)}}

footer{opacity:.7;text-align:center;padding:24px}
header,main,footer{position:relative;z-index:1}
</style>
</head>
<body>
<div class="parallax" id="parallax"></div>
<div class="particles" id="particles"></div>

<header>
  <strong>🎮 GameZone</strong>
  <nav>
    <a href="#top">Начало</a>
    <a href="#fortnite">Fortnite</a>
    <a href="#cs">CS</a>
  </nav>
</header>

<main id="top">
  <section class="hero">
    <div>
      <h1 class="welcome">Добре дошъл в GameZone</h1>
      <p class="subtitle">ULTRA ефекти + гейминг вайб</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn magnet" onclick="playYT()"><span>▶ Музика 1 мин</span></button>
        <a class="btn magnet" href="#fortnite"><span>Fortnite</span></a>
        <a class="btn magnet" href="#cs"><span>CS</span></a>
      </div>
    </div>
  </section>

  <section id="fortnite" class="wrap">
    <div class="card">
      <h2>🔥 Fortnite</h2>
      <div class="video">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/2gUtfB3QhS4" allowfullscreen></iframe>
      </div>
    </div>
  </section>

  <section id="cs" class="wrap">
    <div class="card">
      <h2>💣 CS</h2>
      <div class="video">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/edYCtaNueQY" allowfullscreen></iframe>
      </div>
    </div>
  </section>
</main>

<footer>© 2026 GameZone</footer>

<iframe id="ytplayer" width="0" height="0" style="display:none" allow="autoplay"></iframe>

<script>
const obs=new IntersectionObserver(es=>{es.forEach(e=>e.isIntersecting&&e.target.classList.add('show'))},{threshold:.2});
document.querySelectorAll('.card').forEach(c=>obs.observe(c));

const box=document.getElementById('particles');
for(let i=0;i<80;i++){
  const p=document.createElement('span');
  p.className='particle';
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(6+Math.random()*8)+'s';
  p.style.animationDelay=(-Math.random()*10)+'s';
  box.appendChild(p);
}

document.addEventListener('mousemove', e=>{
  const x=(e.clientX/window.innerWidth-.5)*10;
  const y=(e.clientY/window.innerHeight-.5)*10;
  document.getElementById('parallax').style.transform=`translate(${x}px, ${y}px)`;
});

let t;
function playYT(){
  const f=document.getElementById('ytplayer');
  f.src="https://www.youtube.com/embed/29T7I5-0P5w?autoplay=1";
  clearTimeout(t); t=setTimeout(()=>{f.src="";},60000);
}
</script>
</body>
</html>
